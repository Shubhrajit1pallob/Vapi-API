<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Well-Being Check-In</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main id="app" class="container">
      <!-- Header -->
      <h1 class="title">Survey</h1>

      <!-- Status indicator (hidden until call starts) -->
      <div id="status-area" class="status-area hidden">
        <div id="status-indicator" class="status-indicator">
          <span id="status-icon" class="status-icon"></span>
          <span id="status-text" class="status-text">Connecting…</span>
        </div>
        <!-- Live transcript snippet -->
        <p id="transcript" class="transcript" aria-live="polite"></p>
      </div>

      <!-- Error banner -->
      <div id="error-banner" class="error-banner hidden" role="alert">
        <p id="error-message"></p>
        <button id="error-dismiss" class="btn btn-small" aria-label="Dismiss error">✕</button>
      </div>

      <!-- Patient ID input -->
      <div class="patient-id-section">
        <label for="patient-id" class="patient-id-label">Patient ID</label>
        <input
          id="patient-id"
          class="patient-id-input"
          type="text"
          name="patient-id"
          placeholder="Enter patient ID"
          autocomplete="off"
          required
        />
      </div>

      <!-- Action buttons -->
      <div class="actions">
        <button id="btn-start" class="btn btn-primary">
          Start Survey
        </button>
        <button id="btn-end" class="btn btn-danger hidden">
          End Survey
        </button>
      </div>

      <p class="helper-text">
        Press the button and speak naturally — the assistant will guide you through the survey.
      </p>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
